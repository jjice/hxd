name: Production Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_artifacts:
    name: Package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            pkg_cmd: |
              sudo apt-get update && sudo apt-get install -y rpm
              cpack -G "DEB;RPM;TGZ"
          - os: windows-latest
            pkg_cmd: cpack -G "NSIS;ZIP"
          - os: macos-latest
            pkg_cmd: cpack -G "DragNDrop;TGZ"

    steps:
      - uses: actions/checkout@v4

      - name: Configure and Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Create Packages
        working-directory: build
        run: ${{ matrix.pkg_cmd }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: build/hxed-*.*

  create_release:
    name: Bundle & Publish Release
    needs: build_artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-packages
          merge-multiple: true

      - name: Prepare Detailed Release Notes
        id: notes
        shell: bash
        run: |

          TAG_NAME=${{ github.ref_name }}
          VERSION_CLEAN=${TAG_NAME#v}
          

          sed -n "/## \[$VERSION_CLEAN\]/,/## /p" CHANGELOG.md | sed '$d' > body.md
          

          echo -e "\n## SHA256 Checksums\n\`\`\`" >> body.md
          cd all-packages
          sha256sum hxed-* >> ../body.md
          cd ..
          echo -e "\`\`\`\n" >> body.md
          

          {
            echo "## Installation Assets"
            echo -e "\n### Linux"
            echo "- Debian/Ubuntu: \`hxed-$VERSION_CLEAN-Linux.deb\`"
            echo "- Fedora/RHEL/Arch: \`hxed-$VERSION_CLEAN-Linux.rpm\`"
            echo "- Generic: \`hxed-$VERSION_CLEAN-Linux.tar.gz\`"
            
            echo -e "\n### Windows"
            echo "- Installer: \`hxed-$VERSION_CLEAN-win64.exe\`"
            echo "- Portable: \`hxed-$VERSION_CLEAN-win64.zip\`"
            
            echo -e "\n### MacOS"
            echo "- Disk Image: \`hxed-$VERSION_CLEAN-Darwin.dmg\`"
            echo "- Portable: \`hxed-$VERSION_CLEAN-Darwin.tar.gz\`"
          } >> body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          files: all-packages/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}