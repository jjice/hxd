name: Production Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: hxed-linux-x64
            executable: hxed
          - os: windows-latest
            asset_name: hxed-windows-x64.exe
            executable: hxed.exe
          - os: macos-latest
            asset_name: hxed-macos-arm64
            executable: hxed

    steps:
      - uses: actions/checkout@v4

      - name: Configure and Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          # Wir suchen gezielt in build ODER build/Release (für Windows)
          if [ -f "build/${{ matrix.executable }}" ]; then
            cp "build/${{ matrix.executable }}" "./${{ matrix.asset_name }}"
          elif [ -f "build/Release/${{ matrix.executable }}" ]; then
            cp "build/Release/${{ matrix.executable }}" "./${{ matrix.asset_name }}"
          else
            echo "❌ ERROR: ${{ matrix.executable }} wurde nirgendwo gefunden!"
            ls -R build
            exit 1
          fi
          echo "✅ File copied to: ./${{ matrix.asset_name }}"

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}