name: Production Release

on:
  push:
    tags:
      - 'v*' # Startet nur, wenn ein Tag wie v1.0.0 gepusht wird

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: hxed-linux-x64
          - os: windows-latest
            asset_name: hxed-windows-x64.exe
          - os: macos-latest
            asset_name: hxed-macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wichtig für das automatische Changelog

      - name: Configure and Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true # DAS erstellt das automatische Changelog!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Artifact
        shell: bash
        run: |
          BINARY_PATH=$(find build -type f \( -name "hxed" -o -name "hxed.exe" \) | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            echo "❌ ERROR: Binary not found! Hier ist der Inhalt des build-Ordners:"
            ls -R build
            exit 1
          fi
          
          echo "✅ Found binary at: $BINARY_PATH"
          cp "$BINARY_PATH" ./${{ matrix.asset_name }}