name: Cross-Platform Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: MacOS
            os: macos-latest
          - name: Windows
            os: windows-latest
          - name: ArchLinux
            os: ubuntu-latest
            container: archlinux:latest

    steps:
    - uses: actions/checkout@v4

    # Abhängigkeiten installieren (Nur auf Linux-Systemen)
    - name: Install Dependencies (Linux/Arch)
      if: runner.os == 'Linux'
      run: |
        if command -v pacman &> /dev/null; then
          pacman -Syu --noconfirm base-devel cmake
        else
          sudo apt-get update && sudo apt-get install -y build-essential cmake
        fi

    # Konfigurieren (Plattformunabhängig über CMake)
    - name: Configure CMake
      run: cmake -B build -S .

    # Build (Plattformunabhängig über CMake)
    - name: Build
      run: cmake --build build --config Release

    # Test-Schritt mit korrekten Pfaden
    - name: Run Basic Test
      shell: bash
      run: |
        # Wir suchen rekursiv im build-Ordner nach der hxed Datei
        # und machen sie ausführbar (wichtig für Linux/macOS)
        TARGET=$(find build -name "hxed" -o -name "hxed.exe" | head -n 1)
        
        if [ -z "$TARGET" ]; then
          echo "FEHLER: hxed wurde nirgendwo im build-Ordner gefunden!"
          ls -R build
          exit 1
        fi
        
        echo "Gefundene Datei: $TARGET"
        chmod +x "$TARGET"
        "$TARGET" --help
